<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ff85a2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="БебиЛог">
<title>БебиЛог 🍼</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,#fff0f5 0%,#e6f3ff 100%);min-height:100vh;color:#333;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);user-select:none}
.container{max-width:500px;margin:0 auto;padding:16px}
header{text-align:center;padding:12px 0 20px}
h1{font-size:28px;color:#d63384;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;font-style:italic}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:white;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.stat-card.alert{background:linear-gradient(135deg,#ff6b6b,#ff8787);color:white;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.stat-label{font-size:11px;text-transform:uppercase;opacity:0.7;margin-bottom:4px}
.stat-value{font-size:18px;font-weight:600}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.btn{background:white;border:none;border-radius:20px;padding:18px 8px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.08);transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:6px;color:#333}
.btn:active{transform:scale(0.95)}
.btn .emoji{font-size:32px}
.btn-feed{background:linear-gradient(135deg,#ffe5b4,#ffe0b3)}
.btn-vitamin{background:linear-gradient(135deg,#e6f7ff,#b3e0ff)}
.btn-sleep{background:linear-gradient(135deg,#e6e6ff,#c2c2f0)}
.btn-wake{background:linear-gradient(135deg,#fff9e6,#ffe680)}
.btn-poop{background:linear-gradient(135deg,#f0e6d6,#d4a574);grid-column:span 2}
.btn-voice{background:linear-gradient(135deg,#ffe6f0,#ffb3d9);grid-column:span 2}
.btn-voice.recording{background:linear-gradient(135deg,#ff4444,#cc0000);color:white;animation:pulse 1s infinite}
.day-nav{display:flex;justify-content:space-between;align-items:center;background:white;border-radius:14px;padding:10px 14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.day-nav button{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 10px;color:#d63384}
.day-nav button:disabled{opacity:0.3}
.day-title{font-weight:600;font-size:15px}
.feed{background:white;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06);min-height:200px;margin-bottom:20px}
.feed-title{font-size:14px;font-weight:600;color:#666;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.event{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.event:last-child{border-bottom:none}
.event-emoji{font-size:24px;flex-shrink:0}
.event-info{flex:1}
.event-title{font-weight:600;font-size:14px}
.event-comment{font-size:12px;color:#888;font-style:italic;margin-top:2px}
.event-time{font-size:12px;color:#aaa;flex-shrink:0}
.event-delete{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 4px}
.empty{text-align:center;color:#bbb;padding:30px 10px;font-style:italic}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:12px 20px;border-radius:12px;font-size:14px;z-index:1000;opacity:0;transition:opacity 0.3s;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.toast.show{opacity:1}
.toast.success{background:linear-gradient(135deg,#28a745,#5cb85c)}
.toast.warning{background:linear-gradient(135deg,#ff9500,#ffb347)}
.toast.poop{background:linear-gradient(135deg,#8b4513,#d4a574);font-size:16px}
.voice-note{background:#fff3cd;padding:6px 8px;border-radius:8px;font-size:12px;margin-top:4px;color:#856404}
.export-import{display:flex;gap:10px;margin-bottom:20px}
.export-import button{flex:1;background:white;border:1px solid #ddd;border-radius:10px;padding:8px;font-size:12px;color:#666;cursor:pointer}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px}
.modal.show{display:flex}
.modal-content{background:white;border-radius:20px;padding:24px;max-width:400px;width:100%;text-align:center}
.modal h2{margin-bottom:12px;color:#d63384}
.modal p{margin-bottom:16px;color:#666}
.modal input{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:12px}
.modal-buttons{display:flex;gap:10px}
.modal-buttons button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600}
.btn-cancel{background:#eee;color:#666}
.btn-ok{background:#d63384;color:white}
</style>
</head>
<body>
<div class="container">
<header>
<h1>🍼 БебиЛог</h1>
<div class="subtitle">синхронизировано для двоих родителей 🤝</div>
</header>
<div class="stats">
<div class="stat-card" id="sleepStat">
<div class="stat-label">😴 Последний сон</div>
<div class="stat-value" id="lastSleep">—</div>
</div>
<div class="stat-card" id="poopStat">
<div class="stat-label">💩 Последняя какашка</div>
<div class="stat-value" id="lastPoop">—</div>
</div>
</div>
<div class="buttons">
<button class="btn btn-feed" onclick="addEvent('feed')"><span class="emoji">🍼</span>Покормили</button>
<button class="btn btn-vitamin" onclick="addEvent('vitamin')"><span class="emoji">💧</span>Добавка</button>
<button class="btn btn-sleep" onclick="addEvent('sleep')"><span class="emoji">😴</span>Заснула</button>
<button class="btn btn-wake" onclick="addEvent('wake')"><span class="emoji">⏰</span>Проснулась</button>
<button class="btn btn-poop" onclick="addEvent('poop')"><span class="emoji">💩</span>Покакала</button>
<button class="btn btn-voice" id="voiceBtn" onclick="toggleVoice()"><span class="emoji">🎤</span><span id="voiceLabel">Голосовая заметка</span></button>
</div>
<div class="day-nav">
<button onclick="changeDay(-1)" id="prevDay">‹</button>
<div class="day-title" id="dayTitle">Сегодня</div>
<button onclick="changeDay(1)" id="nextDay" disabled>›</button>
</div>
<div class="feed">
<div class="feed-title">📋 Лента событий</div>
<div id="eventsList"></div>
</div>
<div class="export-import">
<button onclick="exportData()">📤 Экспорт</button>
<button onclick="document.getElementById('importFile').click()">📥 Импорт</button>
</div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>
<div class="toast" id="toast"></div>
<div class="modal" id="vitaminModal">
<div class="modal-content">
<h2>💧 Какая добавка?</h2>
<p>Что дали малышке?</p>
<input type="text" id="vitaminInput" placeholder="Витамин D, 1 капля" value="Витамин D">
<div class="modal-buttons">
<button class="btn-cancel" onclick="closeModal()">Отмена</button>
<button class="btn-ok" onclick="confirmVitamin()">Записать</button>
</div>
</div>
</div>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
var comments = {feed:["Опять пир горой","Желудок заправлен","Голод побежден","Бутылочка осушена","Шеф-повар свободен","Топливо принято"],vitamin:["Доктор прописал","Профилактика активна","Витаминка на борту","Здоровья +1","Аптечка в действии"],sleep:["Храп detected","Режим энергосбережения","Малышка ушла в офлайн","Тишина","Полчаса свободы","Кораблик уплыл"],wake:["Тревога","Будильник сработал","Глазки открыты","Привет миру","Кто звал"],poop:["ПОБЕДА","Произведение искусства","Подгузник в деле","Биология не подвела","Свершилось чудо","Аплодисменты","Минус один подгузник"]};
var titles = {feed:"Покормили",vitamin:"Добавка",sleep:"Заснула",wake:"Проснулась",poop:"Покакала",voice:"Голосовая заметка"};
var events = [];
var viewDate = new Date();
viewDate.setHours(0,0,0,0);
var mediaRecorder = null;
var audioChunks = [];
var isRecording = false;
var socket = io();
socket.on("connect",function(){console.log("ok")});
socket.on("all_events",function(d){events=d;render()});
socket.on("new_event",function(e){events.push(e);render()});
socket.on("delete_event",function(id){events=events.filter(function(e){return e.id!==id});render()});
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function formatDur(m){if(m<1)return"только что";if(m<60)return m+" мин";var h=Math.floor(m/60);var mn=m%60;return mn?h+"ч "+mn+"мин":h+"ч"}
function formatTime(i){var d=new Date(i);return d.toTimeString().slice(0,5)}
function sameDay(a,b){return a.toDateString()===b.toDateString()}
function addEvent(t){if(t==="vitamin"){document.getElementById("vitaminModal").classList.add("show");return}var e={type:t,time:new Date().toISOString(),comment:rand(comments[t])};socket.emit("add_event",e);if(t==="poop"){showToast("ПОЗДРАВЛЯЕМ!","poop",3000);if(navigator.vibrate)navigator.vibrate([100,50,100,50,200])}else if(t==="sleep"){showToast("Заснула","success")}else if(t==="wake"){var ls=events.slice().reverse().find(function(e){return e.type==="sleep"});if(ls){var d=Math.round((Date.now()-new Date(ls.time))/60000);showToast("Спала "+formatDur(d),"success")}else{showToast("Проснулась","success")}}else{showToast(titles[t],"success")}}
function closeModal(){document.getElementById("vitaminModal").classList.remove("show")}
function confirmVitamin(){var v=document.getElementById("vitaminInput").value.trim()||"Витамин D";socket.emit("add_event",{type:"vitamin",time:new Date().toISOString(),comment:rand(comments.vitamin),detail:v});closeModal();showToast(v+" записано","success")}
function deleteEvent(id){if(!confirm("Удалить?"))return;socket.emit("delete_event",id)}
function changeDay(d){var t=new Date();t.setHours(0,0,0,0);var n=new Date(viewDate);n.setDate(n.getDate()+d);if(n>t)return;viewDate=n;render()}
function render(){var t=new Date();t.setHours(0,0,0);var dt=document.getElementById("dayTitle");if(sameDay(viewDate,t)){dt.textContent="Сегодня "+viewDate.toLocaleDateString("ru-RU",{day:"numeric",month:"long"})}else{dt.textContent=viewDate.toLocaleDateString("ru-RU",{weekday:"short",day:"numeric",month:"long"})}document.getElementById("nextDay").disabled=sameDay(viewDate,t);var sl=events.filter(function(e){return e.type==="sleep"});var wk=events.filter(function(e){return e.type==="wake"});var se=document.getElementById("lastSleep");if(sl.length){var ls=sl[sl.length-1];var wa=wk.find(function(w){return new Date(w.time)>new Date(ls.time)});if(wa){se.textContent=formatDur(Math.round((new Date(wa.time)-new Date(ls.time))/60000))}else{var m=Math.round((Date.now()-new Date(ls.time))/60000);se.textContent="спит "+formatDur(m)}}else{se.textContent="-"}var pp=events.filter(function(e){return e.type==="poop"});var pc=document.getElementById("poopStat");var pe=document.getElementById("lastPoop");if(pp.length){var la=pp[pp.length-1];var h=(Date.now()-new Date(la.time))/3600000;pe.textContent=h<1?Math.round(h*60)+" мин назад":Math.round(h)+" ч назад";if(h>24){pc.classList.add("alert");pe.textContent=Math.round(h)+"ч!"}else{pc.classList.remove("alert")}}else{pe.textContent="никогда";pc.classList.remove("alert")}var de=events.filter(function(e){return sameDay(new Date(e.time),viewDate)}).sort(function(a,b){return new Date(b.time)-new Date(a.time)});var li=document.getElementById("eventsList");if(!de.length){li.innerHTML="<div class=empty>Пока тихо</div>";return}li.innerHTML=de.map(function(e){var em=(titles[e.type]||"?").split(" ")[0];var ti=(titles[e.type]||e.type);return "<div class=event><div class=event-emoji>"+em+"</div><div class=event-info><div class=event-title>"+ti+(e.detail?" "+e.detail:"")+'</div><div class=event-comment>'+(e.comment||"")+"</div></div><div class=event-time>"+formatTime(e.time)+'</div><button class=event-delete onclick="deleteEvent('+e.id+')">x</button></div>'}).join("")}
function showToast(m,t,d){if(!t)t="";if(!d)d=2000;var o=document.getElementById("toast");o.textContent=m;o.className="toast "+t+" show";setTimeout(function(){o.classList.remove("show")},d)}
async function toggleVoice(){if(!isRecording){try{var s=await navigator.mediaDevices.getUserMedia({audio:true});mediaRecorder=new MediaRecorder(s);audioChunks=[];mediaRecorder.ondataavailable=function(e){audioChunks.push(e.data)};mediaRecorder.onstop=function(){var b=new Blob(audioChunks,{type:"audio/webm"});var r=new FileReader();r.onloadend=function(){socket.emit("add_event",{type:"voice",time:new Date().toISOString(),comment:"Голосовое сообщение",audio:r.result});showToast("Сохранено","success")};r.readAsDataURL(b);s.getTracks().forEach(function(t){t.stop()})};mediaRecorder.start();isRecording=true;document.getElementById("voiceBtn").classList.add("recording");document.getElementById("voiceLabel").textContent="Остановить"}catch(e){alert("Микрофон: "+e.message)}}else{mediaRecorder.stop();isRecording=false;document.getElementById("voiceBtn").classList.remove("recording");document.getElementById("voiceLabel").textContent="Голосовая заметка"}}
function exportData(){var d=JSON.stringify(events,null,2);var b=new Blob([d],{type:"application/json"});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="babylog-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(u)}
function importData(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!Array.isArray(d))throw Error("bad");if(confirm("Заменить?")){events=d;showToast("Импорт готов","success")}}catch(e){alert("Ошибка: "+e.message)}};r.readAsText(f)}
setInterval(render,5000);
render();
</script>
</body>
</html>
